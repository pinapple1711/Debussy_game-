<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0a1a; }
  canvas { display:block; width:100vw; height:100vh; }
  #ui { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5; }
  .popup {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(8,8,25,0.97); border:2px solid #7F77DD;
    border-radius:14px; padding:24px 30px; max-width:380px; width:90%;
    color:#e0deff; text-align:center; display:none; z-index:20; pointer-events:all;
    direction:rtl;
  }
  .popup h3 { color:#AFA9EC; font-size:13px; margin-bottom:10px; letter-spacing:1px; font-family:sans-serif; }
  .popup p { font-size:15px; line-height:1.75; color:#e0deff; font-family:sans-serif; }
  .popup button {
    margin-top:16px; padding:8px 24px; background:#534AB7;
    border:none; border-radius:8px; color:white; font-size:14px; cursor:pointer; font-family:sans-serif;
  }
  .popup button:hover { background:#7F77DD; }
  #gameover { border-color:#D85A30; }
  #gameover h2 { color:#F0997B; margin-bottom:8px; font-family:sans-serif; }
  #gameover button { background:#D85A30; }
  #gameover button:hover { background:#F0997B; }
  #hud {
    position:fixed; top:0; left:0; width:100%; padding:12px 20px;
    display:flex; justify-content:space-between; align-items:center;
    pointer-events:none; z-index:10; direction:rtl;
  }
  .hud-box {
    background:rgba(8,8,25,0.75); border:1px solid #534AB7;
    border-radius:8px; padding:6px 14px; color:#AFA9EC;
    font-family:sans-serif; font-size:15px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-box" id="hud-score">النقاط: 0</div>
  <div class="hud-box" id="hud-lives">❤️❤️❤️</div>
  <div class="hud-box" id="hud-facts">معلومات: 0/4</div>
</div>

<div class="popup" id="info-popup">
  <h3>🎵 معلومة عن ديبوسي</h3>
  <p id="info-text"></p>
  <button onclick="closeInfo()">استمر في القتال!</button>
</div>
<div class="popup" id="gameover">
  <h2>💀 وصل الزومبي لديبوسي!</h2>
  <p style="color:#aaa;font-size:13px;margin-top:6px;font-family:sans-serif;">حاول مرة أخرى</p>
  <button onclick="initGame()">إعادة اللعبة</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); });

const facts = [
  "كلود ديبوسي (١٨٦٢–١٩١٨م)\nوُلد في قرية سان جيرمان الفرنسية، وهو من رواد الموسيقى الفرنسية، وأحد أبرز الأسماء الموسيقية في أواخر القرن التاسع عشر وأوائل القرن العشرين. اشتُهر بجهوده لإعادة بريق الموسيقى الفرنسية.",
  "أرسله والده إلى باريس للدراسة في الكونسرفتوار، وفي عام ١٨٨٤م حصل على جائزة روما الموسيقية المرموقة.",
  "كتب ديبوسي أول أعماله الأوبرالية (بيلاس وميلزاندا) عام ١٩٠٢م، بأسلوب موسيقي تعبيري جميل، وتوفي عام ١٩١٨م في باريس.",
  "من أبرز أعماله:\n• مقطوعة ريفية (انتر ميتزو)\n• سيمفونية (سويت)\n• سيمفونية تعبيرية بعنوان البحر"
];

// ── Audio ──────────────────────────────────────────────────────────────────
let actx = null;
function getACtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function playNote(freq, dur, vol=0.18, type='sine') {
  const ac = getACtx();
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
function playShoot() { playNote(880, 0.08, 0.12, 'square'); playNote(660, 0.12, 0.08, 'square'); }
function playKill() {
  [200,150,100].forEach((f,i) => setTimeout(() => playNote(f, 0.15, 0.18, 'sawtooth'), i*60));
}
function playHurt() { playNote(120, 0.3, 0.25, 'sawtooth'); }
function playInfo() {
  const mel = [523,659,784,1047];
  mel.forEach((f,i) => setTimeout(() => playNote(f, 0.25, 0.15, 'sine'), i*120));
}
// Ambient background piano loop
let ambientRunning = false;
const pianoNotes = [261,294,329,349,392,440,494,523];
function ambientBeat() {
  if (!ambientRunning) return;
  const f = pianoNotes[Math.floor(Math.random()*pianoNotes.length)];
  playNote(f, 0.6, 0.06, 'sine');
  setTimeout(ambientBeat, 300 + Math.random()*500);
}

// ── State ──────────────────────────────────────────────────────────────────
let zombies=[], bullets=[], particles=[];
let score=0, lives=3, infoShown=0, factIndex=0, killsSinceInfo=0, nextInfoIn=0;
let paused=false, gameOver=false, spawnTimer=0, lastTime=0;
let mouseX, mouseY;

function initGame() {
  zombies=[]; bullets=[]; particles=[];
  score=0; lives=3; infoShown=0; factIndex=0; killsSinceInfo=0; nextInfoIn=0;
  paused=false; gameOver=false; spawnTimer=0;
  document.getElementById('gameover').style.display='none';
  document.getElementById('info-popup').style.display='none';
  updateHUD();
  if (!ambientRunning) { ambientRunning=true; ambientBeat(); }
  requestAnimationFrame(loop);
}

function updateHUD() {
  document.getElementById('hud-score').textContent = 'النقاط: '+score;
  document.getElementById('hud-lives').textContent = '❤️'.repeat(Math.max(0,lives));
  document.getElementById('hud-facts').textContent = 'معلومات: '+infoShown+'/4';
}

canvas.addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; });
canvas.addEventListener('click', shoot);
canvas.style.cursor='none';
mouseX = window.innerWidth/2; mouseY = window.innerHeight/2;

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  mouseX=e.touches[0].clientX; mouseY=e.touches[0].clientY;
  shoot();
},{passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX=e.touches[0].clientX; mouseY=e.touches[0].clientY;
},{passive:false});

function shoot() {
  if (paused||gameOver) return;
  getACtx(); playShoot();
  const W=canvas.width, H=canvas.height;
  const px=W/2, py=H-70;
  bullets.push({x:px,y:py-10,tx:mouseX,ty:mouseY,vx:0,vy:0,speed:16,r:5});
}

function spawnZombie() {
  const W=canvas.width, H=canvas.height;
  const side = Math.random()<0.5 ? 0 : W;
  zombies.push({
    x:side, y:H-90-Math.random()*40,
    speed:0.9+Math.random()*1.0,
    dir:side===0?1:-1, hp:1
  });
}

function closeInfo() {
  document.getElementById('info-popup').style.display='none';
  paused=false;
}
function showInfo() {
  if (factIndex>=facts.length) return;
  document.getElementById('info-text').textContent=facts[factIndex++];
  document.getElementById('info-popup').style.display='block';
  infoShown++;
  updateHUD();
  paused=true; playInfo();
}

function spawnParticles(x,y,color) {
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color});
  }
}

// ── Draw ───────────────────────────────────────────────────────────────────
function drawBg() {
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,W,H);
  // Moon
  ctx.fillStyle='rgba(220,210,255,0.18)';
  ctx.beginPath(); ctx.arc(W*0.8,H*0.12,55,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(220,210,255,0.28)';
  ctx.beginPath(); ctx.arc(W*0.8,H*0.12,38,0,Math.PI*2); ctx.fill();
  // Stars
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(let i=0;i<100;i++){
    const sx=(i*137.5+13)%W, sy=(i*97.3+7)%(H*0.65);
    ctx.fillRect(sx,sy,1.2,1.2);
  }
  // Ground
  ctx.fillStyle='#14082a'; ctx.fillRect(0,H-60,W,60);
  ctx.strokeStyle='#534AB7'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,H-60); ctx.lineTo(W,H-60); ctx.stroke();
}

function drawZombie(z) {
  const x=z.x, y=z.y;
  ctx.fillStyle='#3d6b3a';
  ctx.fillRect(x-11,y-32,22,30);
  ctx.fillStyle='#4a7a46';
  ctx.beginPath(); ctx.arc(x,y-42,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff2200';
  ctx.beginPath(); ctx.arc(x-5,y-44,3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+5,y-44,3.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#3d6b3a'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(x-11,y-24);
  ctx.lineTo(x-(z.dir>0?30:18),y-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+11,y-24);
  ctx.lineTo(x+(z.dir>0?18:30),y-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-5,y-2); ctx.lineTo(x-8,y+16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+5,y-2); ctx.lineTo(x+8,y+16); ctx.stroke();
}

function drawPlayer() {
  const W=canvas.width, H=canvas.height;
  const x=W/2, y=H-70;
  ctx.fillStyle='#111128'; ctx.strokeStyle='#AFA9EC'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(x-40,y-22,80,34,7); ctx.fill(); ctx.stroke();
  for(let i=0;i<8;i++){
    ctx.fillStyle='#e8e8f4';
    ctx.fillRect(x-34+i*10,y-15,8,20);
    ctx.strokeStyle='#9090c0'; ctx.lineWidth=0.5;
    ctx.strokeRect(x-34+i*10,y-15,8,20);
  }
  [0,1,3,4,6].forEach(k=>{
    ctx.fillStyle='#0a0a1a'; ctx.fillRect(x-29+k*10,y-15,6,13);
  });
  ctx.fillStyle='#f5cba7';
  ctx.beginPath(); ctx.arc(x,y-38,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3a2000';
  ctx.beginPath(); ctx.ellipse(x,y-47,13,6,0,Math.PI,0); ctx.fill();
}

function drawBullet(b) {
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,220,0,0.25)';
  ctx.beginPath(); ctx.arc(b.x-b.vx*2,b.y-b.vy*2,b.r*2,0,Math.PI*2); ctx.fill();
}

function drawCrosshair() {
  if (mouseX===undefined) return;
  ctx.strokeStyle='rgba(255,80,80,0.9)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(mouseX-16,mouseY); ctx.lineTo(mouseX+16,mouseY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mouseX,mouseY-16); ctx.lineTo(mouseX,mouseY+16); ctx.stroke();
  ctx.beginPath(); ctx.arc(mouseX,mouseY,10,0,Math.PI*2); ctx.stroke();
}

// ── Game loop ──────────────────────────────────────────────────────────────
function loop(ts) {
  if (gameOver) return;
  const dt = ts - lastTime; lastTime = ts;
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  drawBg();

  if (!paused) {
    spawnTimer += dt;
    const interval = Math.max(900, 2200 - score*3);
    if (spawnTimer > interval) { spawnZombie(); spawnTimer=0; }

    bullets.forEach(b => {
      const len=Math.hypot(b.tx-b.x,b.ty-b.y)||1;
      b.vx=(b.tx-b.x)/len*b.speed;
      b.vy=(b.ty-b.y)/len*b.speed;
      b.x+=b.vx; b.y+=b.vy;
    });
    bullets=bullets.filter(b=>b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10);

    zombies.forEach(z=>{ z.x+=z.speed*z.dir; });

    // Bullet-zombie collision
    bullets=bullets.filter(b=>{
      for(let i=zombies.length-1;i>=0;i--){
        const z=zombies[i];
        if(Math.abs(b.x-z.x)<20&&Math.abs(b.y-z.y)<32){
          spawnParticles(z.x,z.y,'#3d6b3a');
          zombies.splice(i,1);
          score+=10;
          updateHUD();
          playKill();
          // Random info trigger (~20% chance, min 2 kills apart)
          if(factIndex<facts.length){
            killsSinceInfo++;
            const minGap = 2;
            const chance = 0.20;
            if(killsSinceInfo >= minGap && Math.random() < chance){
              killsSinceInfo = 0;
              setTimeout(showInfo, 120);
            }
          }
          return false;
        }
      }
      return true;
    });

    // Zombie reaches player
    zombies=zombies.filter(z=>{
      if(Math.abs(z.x-W/2)<50&&z.y>H-120){
        lives--; spawnParticles(z.x,z.y,'#ff4444');
        playHurt(); updateHUD();
        if(lives<=0){
          gameOver=true;
          document.getElementById('gameover').style.display='block';
          ambientRunning=false;
        }
        return false;
      }
      return z.x>-60&&z.x<W+60;
    });

    particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=0.035; });
    particles=particles.filter(p=>p.life>0);
  }

  zombies.forEach(drawZombie);
  bullets.forEach(drawBullet);
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
  drawPlayer();
  drawCrosshair();
  requestAnimationFrame(loop);
}

initGame();
</script>
</body>
</html>
